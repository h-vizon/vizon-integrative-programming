<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | NEURON</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVIGATION -->
    <nav class="main-nav">
      <div class="container nav-wrapper">
        <div class="nav-logo">NEURON</div>
        <ul class="nav-links">
          <li><a href="index.html">HOME</a></li>
          <li><a href="signup.html">SIGN UP</a></li>
        </ul>
        <div class="nav-spacer"></div>
      </div>
    </nav>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
      <div class="auth-box">
        <h1 class="section-title">Login</h1>

        <form class="auth-form" id="login-form" novalidate>
          <input type="email" id="login-email" placeholder="Email" />
          <input type="password" id="login-password" placeholder="Password" />
          <button class="btn-lava" type="submit">Login</button>
        </form>

        <p class="auth-text">
          Don't have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
    <script>
      // Override login submit to support admin redirect
      document.getElementById("login-form").addEventListener(
        "submit",
        function (e) {
          // Admin shortcut: if email contains "admin", set role and redirect
          const email = document.getElementById("login-email").value.trim();
          if (email.toLowerCase().includes("admin")) {
            sessionStorage.setItem("userRole", "admin");
          } else {
            sessionStorage.setItem("userRole", "user");
          }
        },
        true,
      ); // capture phase so it runs before script.js redirect
    </script>
  </body>
</html>
