<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | NEURON</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVIGATION -->
    <nav class="main-nav">
      <div class="container nav-wrapper">
        <div class="nav-logo">NEURON</div>
        <ul class="nav-links">
          <li><a href="profile.html">PROFILE</a></li>
        </ul>
        <div class="nav-spacer"></div>
      </div>
    </nav>

    <!-- SETTINGS SECTION -->
    <section class="auth-section">
      <div class="auth-box">
        <h1 class="section-title">Settings</h1>

        <form class="auth-form" id="settings-form" novalidate>
          <input
            type="email"
            id="settings-email"
            placeholder="Change Email (optional)"
          />
          <input
            type="text"
            id="settings-address"
            placeholder="Change Address (optional)"
          />
          <input
            type="password"
            id="settings-password"
            placeholder="New Password (optional)"
          />
          <input
            type="password"
            id="settings-confirm"
            placeholder="Confirm New Password"
          />

          <select
            style="
              padding: 15px;
              font-family: Rajdhani;
              background: rgba(255, 255, 255, 0.05);
              color: #fff;
              border: 1px solid #333;
              border-radius: 5px;
            "
          >
            <option>Theme: Lava (Default)</option>
            <option>Theme: Dark</option>
            <option>Theme: Neon</option>
          </select>

          <button type="submit" class="btn-lava">Save Settings</button>
        </form>

        <p class="auth-text">
          <a href="profile.html">← Back to Profile</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
