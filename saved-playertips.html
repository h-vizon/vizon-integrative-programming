<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Tips | NEURON</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      .saved-section {
        min-height: 100vh;
        padding: 120px 20px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .saved-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .saved-header p {
        font-family: "Rajdhani", sans-serif;
        color: #ffdcb3;
        font-size: 1.1rem;
        margin-top: 8px;
      }

      .saved-actions {
        display: flex;
        gap: 16px;
        margin-bottom: 30px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn-clear-all {
        background: transparent;
        border: 1px solid rgba(255,0,64,0.4);
        color: #ff4466;
        padding: 10px 24px;
        border-radius: 30px;
        font-family: "Orbitron", sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-clear-all:hover {
        background: rgba(255,0,64,0.1);
        box-shadow: 0 0 15px rgba(255,0,64,0.3);
      }

      .saved-empty {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-top: 40px;
        font-family: "Rajdhani", sans-serif;
        color: #555;
        font-size: 1.1rem;
        text-align: center;
      }

      .saved-empty span { font-size: 3rem; }

      .saved-empty a {
        color: var(--lava-orange);
        text-decoration: none;
        font-weight: 600;
        border: 1px solid rgba(255,78,0,0.4);
        padding: 10px 24px;
        border-radius: 30px;
        transition: 0.3s;
      }

      .saved-empty a:hover { background: rgba(255,78,0,0.1); }

      .saved-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 960px;
      }

      .saved-card {
        background: rgba(0,0,0,0.65);
        border: 1px solid rgba(255,78,0,0.25);
        border-top: 3px solid var(--lava-orange);
        border-radius: 16px;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        animation: fadeUp 0.3s ease;
        transition: 0.3s;
      }

      .saved-card:hover {
        border-color: var(--lava-orange);
        box-shadow: 0 0 20px rgba(255,78,0,0.2);
        transform: translateY(-3px);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(15px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .quote-mark {
        font-size: 3rem;
        color: var(--lava-orange);
        opacity: 0.4;
        line-height: 1;
        font-family: Georgia, serif;
        margin-bottom: -10px;
      }

      .saved-quote-text {
        font-family: "Rajdhani", sans-serif;
        font-size: 1.05rem;
        color: #fff;
        line-height: 1.6;
        font-style: italic;
      }

      .saved-quote-author {
        font-family: "Orbitron", sans-serif;
        font-size: 0.75rem;
        color: var(--lava-orange);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .saved-quote-tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-family: "Rajdhani", sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        background: rgba(255,78,0,0.1);
        border: 1px solid rgba(255,78,0,0.25);
        color: #aaa;
      }

      .btn-remove {
        background: transparent;
        border: 1px solid rgba(255,0,64,0.4);
        color: #ff4466;
        padding: 7px 16px;
        border-radius: 20px;
        font-family: "Rajdhani", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        align-self: flex-start;
        margin-top: auto;
      }

      .btn-remove:hover {
        background: rgba(255,0,64,0.15);
        box-shadow: 0 0 12px rgba(255,0,64,0.3);
      }

      @media (max-width: 600px) {
        .saved-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>

  <body>
    <nav class="main-nav">
      <div class="container nav-wrapper">
        <div class="nav-logo">NEURON</div>
        <ul class="nav-links">
          <li><a href="index.html">HOME</a></li>
          <li><a href="playertips.html">TIPS</a></li>
          <li><a href="saved-playertips.html" style="color: var(--lava-orange);">SAVED</a></li>
          <li><a href="login.html">LOGIN</a></li>
        </ul>
        <div class="nav-spacer"></div>
      </div>
    </nav>

    <section class="saved-section">

      <div class="saved-header">
        <h1 class="section-title">Saved Tips</h1>
        <p>Your personal collection of motivational player tips.</p>
      </div>

      <div class="saved-actions">
        <a href="playertips.html" class="btn-lava" style="font-size:0.8rem; padding:12px 28px;">
          + Browse More Tips
        </a>
        <button class="btn-clear-all" onclick="clearAll()">🗑 Clear All</button>
      </div>

      <div class="saved-empty" id="empty-state">
        <span>💬</span>
        <p>No saved tips yet.</p>
        <a href="playertips.html">Browse tips to save them</a>
      </div>

      <div class="saved-grid" id="saved-grid"></div>

    </section>

    <footer>
      <p>NEURON: Lava Series &bull; Saved Tips &bull; Powered by <strong>Quotable API</strong></p>
    </footer>

    <script src="script.js"></script>
    <script>
      function renderSaved() {
        const saved = JSON.parse(localStorage.getItem("savedQuotes") || "[]");
        const grid  = document.getElementById("saved-grid");
        const empty = document.getElementById("empty-state");

        grid.innerHTML = "";

        if (saved.length === 0) {
          empty.style.display = "flex";
          return;
        }

        empty.style.display = "none";

        saved.forEach((item, index) => {
          grid.innerHTML += `
            <div class="saved-card" id="card-${index}">
              <div class="quote-mark">"</div>
              <div class="saved-quote-text">${item.content}</div>
              <div class="saved-quote-author">— ${item.author}</div>
              <span class="saved-quote-tag">${item.tag}</span>
              <button class="btn-remove" onclick="removeItem(${index})">🗑 Remove</button>
            </div>`;
        });
      }

      function removeItem(index) {
        const saved = JSON.parse(localStorage.getItem("savedQuotes") || "[]");
        const removed = saved[index].author;
        saved.splice(index, 1);
        localStorage.setItem("savedQuotes", JSON.stringify(saved));
        showToast(`✔ Tip by "${removed}" removed.`, "success");
        renderSaved();
      }

      function clearAll() {
        if (confirm("Are you sure you want to clear all saved tips?")) {
          localStorage.removeItem("savedQuotes");
          showToast("✔ All saved tips cleared.", "success");
          renderSaved();
        }
      }

      renderSaved();
    </script>
  </body>
</html>
